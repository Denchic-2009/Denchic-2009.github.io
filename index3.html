<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Устройство и работа интернета</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #02040a; /* ещё более глубокий космос */
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .title-container {
            margin-top: 22vh;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5.2rem;
            font-weight: 900;
            letter-spacing: 18px;
            color: #00f0ff;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 
                0 0 8px #00f0ff,
                0 0 20px #00f0ff,
                0 0 40px #0088ff,
                0 0 80px #0066cc;
            animation: pulse-glow 2.5s infinite alternate, glitch 4s infinite;
        }

        .info-panel {
            margin-bottom: 6vh;
            background: rgba(0, 25, 50, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 220, 255, 0.5);
            border-radius: 16px;
            padding: 25px 35px;
            width: 82%;
            max-width: 920px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.25);
            pointer-events: auto;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
        }

        .info-table th, .info-table td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }

        .info-table th {
            color: #00ffff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            width: 32%;
            font-family: 'Orbitron', sans-serif;
        }

        .info-table td {
            color: #c0f0ff;
            font-family: monospace;
            font-size: 1.15rem;
        }

        .highlight {
            color: #ffffff;
            text-shadow: 0 0 8px #00ffff;
        }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 8px #00f0ff, 0 0 25px #00f0ff; }
            100% { text-shadow: 0 0 12px #00f0ff, 0 0 45px #0088ff, 0 0 90px #0066cc; }
        }

        @keyframes glitch {
            0%, 96%, 98%, 100% { transform: translate(0); }
            97% { transform: translate(-3px, 2px); }
            99% { transform: translate(3px, -2px); }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="content-overlay">
        <div class="title-container">
            <h1>Интернет</h1>
        </div>

        <div class="info-panel">
            <table class="info-table">
                <tr>
                    <th>IP Сервера</th>
                    <td id="server-ip" class="highlight">104.21.75.123</td>
                </tr>
                <tr>
                    <th>IP Клиента</th>
                    <td id="client-ip">Определение...</td>
                </tr>
                <tr>
                    <th>Браузер (User-Agent)</th>
                    <td id="browser-info">...</td>
                </tr>
                <tr>
                    <th>DNS Серверы</th>
                    <td>Основной: 8.8.8.8 | Дополнительный: 1.1.1.1</td>
                </tr>
                <tr>
                    <th>Протоколы</th>
                    <td>IPv4, TCP, TLS v1.3, HTTP/2</td>
                </tr>
            </table>
        </div>
    </div>

    <script>

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.3, 1000);
        camera.position.set(0, 15, 12);
        camera.lookAt(0, -4, 0);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // === ЯРКИЙ ГЛОБУС ===
        const globeGeometry = new THREE.SphereGeometry(10, 64, 64);
        const globeMaterial = new THREE.MeshBasicMaterial({
            color: 0x0033aa,        // значительно ярче (было 0x001133)
            transparent: true,
            opacity: 0.85,          // повысил непрозрачность
        });
        const globe = new THREE.Mesh(globeGeometry, globeMaterial);
        earthGroup.add(globe);

        // Сетка (сделали чуть ярче)
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ccff,
            wireframe: true,
            transparent: true,
            opacity: 0.25
        });
        const wireframe = new THREE.Mesh(globeGeometry, wireframeMaterial);
        earthGroup.add(wireframe);

        // Узлы (ярче)
        const nodesCount = 150;
        const nodesGeometry = new THREE.BufferGeometry();
        const nodesPositions = new Float32Array(nodesCount * 3);
        const nodesVectors = [];

        for (let i = 0; i < nodesCount; i++) {
            const phi = Math.acos(-1 + (2 * i) / nodesCount);
            const theta = Math.sqrt(nodesCount * Math.PI) * phi;
            
            const r = 10.12;
            const x = r * Math.cos(theta) * Math.sin(phi);
            const y = r * Math.cos(phi);
            const z = r * Math.sin(theta) * Math.sin(phi);

            nodesPositions[i * 3] = x;
            nodesPositions[i * 3 + 1] = y;
            nodesPositions[i * 3 + 2] = z;
            nodesVectors.push(new THREE.Vector3(x, y, z));
        }

        nodesGeometry.setAttribute('position', new THREE.BufferAttribute(nodesPositions, 3));
        const nodesMaterial = new THREE.PointsMaterial({
            color: 0x00ffff,
            size: 0.25,
            transparent: true,
            opacity: 0.9
        });
        const nodes = new THREE.Points(nodesGeometry, nodesMaterial);
        earthGroup.add(nodes);

        // Пакеты данных
        const linesGroup = new THREE.Group();
        earthGroup.add(linesGroup);
        const activeLines = [];

        function spawnPacket() {
            if (activeLines.length > 25) return;

            const startIndex = Math.floor(Math.random() * nodesCount);
            let endIndex = Math.floor(Math.random() * nodesCount);
            while (startIndex === endIndex) endIndex = Math.floor(Math.random() * nodesCount);

            const startNode = nodesVectors[startIndex];
            const endNode = nodesVectors[endIndex];

            const midPoint = startNode.clone().add(endNode).multiplyScalar(0.5);
            midPoint.normalize().multiplyScalar(13 + Math.random() * 4);

            const curve = new THREE.QuadraticBezierCurve3(startNode, midPoint, endNode);
            const points = curve.getPoints(50);
            const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
            
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0x44ffff,
                transparent: true,
                opacity: 1
            });

            const line = new THREE.Line(lineGeometry, lineMaterial);
            linesGroup.add(line);

            activeLines.push({ mesh: line, life: 1.1 });
        }

            earthGroup.rotation.y += 0.0012;

            if (Math.random() > 0.75) spawnPacket();

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(earthGroup);

        // === ЯРКИЙ ГЛОБУС ===

        const globeMaterial = new THREE.MeshBasicMaterial({
            color: 0x0033aa,
            transparent: true,
            opacity: 0.85,
        });
        const globe = new THREE.Mesh(globeGeometry, globeMaterial);

        });

            const theta = Math.sqrt(nodesCount * Math.PI) * phi;
            
            const r = 10.12;
            const x = r * Math.cos(theta) * Math.sin(phi);
            const y = r * Math.cos(phi);
            const z = r * Math.sin(theta) * Math.sin(phi);

            nodesPositions[i * 3] = x;
            nodesPositions[i * 3 + 1] = y;
            nodesPositions[i * 3 + 2] = z;
            nodesVectors.push(new THREE.Vector3(x, y, z));
        }

        nodesGeometry.setAttribute('position', new THREE.BufferAttribute(nodesPositions, 3));
        const nodesMaterial = new THREE.PointsMaterial({
            color: 0x00ffff,
            size: 0.25,
            transparent: true,
            opacity: 0.9
        });
        const nodes = new THREE.Points(nodesGeometry, nodesMaterial);
        earthGroup.add(nodes);

        const linesGroup = new THREE.Group();
        earthGroup.add(linesGroup);
        const activeLines = [];

        function spawnPacket() {
            if (activeLines.length > 25) return;
            const startIndex = Math.floor(Math.random() * nodesCount);
            let endIndex = Math.floor(Math.random() * nodesCount);
            while (startIndex === endIndex) endIndex = Math.floor(Math.random() * nodesCount);

            const startNode = nodesVectors[startIndex];
            const endNode = nodesVectors[endIndex];
            const midPoint = startNode.clone().add(endNode).multiplyScalar(0.5);
            midPoint.normalize().multiplyScalar(13 + Math.random() * 4);

            const curve = new THREE.QuadraticBezierCurve3(startNode, midPoint, endNode);
            const points = curve.getPoints(50);
            const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
            
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0x44ffff,

            const line = new THREE.Line(lineGeometry, lineMaterial);
            linesGroup.add(line);
            activeLines.push({ mesh: line, life: 1.1 });

        function animate() {
            requestAnimationFrame(animate);
            earthGroup.rotation.y += 0.0012;

            if (Math.random() > 0.75) spawnPacket();

            for (let i = activeLines.length - 1; i >= 0; i--) {
                const lineObj = activeLines[i];
                lineObj.life -= 0.018;
                lineObj.mesh.material.opacity = lineObj.life;

                if (lineObj.life <= 0) {
                    linesGroup.remove(lineObj.mesh);
                    lineObj.mesh.geometry.dispose();
                    lineObj.mesh.material.dispose();
                    activeLines.splice(i, 1);
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

        // ====================== НОВЫЕ ФУНКЦИИ ======================

        // IP Сервера
        async function getServerIP() {
            const el = document.getElementById('server-ip');
            const hostname = window.location.hostname;
            
            el.textContent = hostname + " (определяем IP...)";
            
            try {
                const response = await fetch(`https://dns.google/resolve?name=${hostname}&type=A`);
                const data = await response.json();
                
                if (data.Answer && data.Answer[0] && data.Answer[0].data) {
                    const ip = data.Answer[0].data;
                    el.innerHTML = `\( {hostname} <span style="color:#00ff88; font-weight:bold;">( \){ip})</span>`;
                } else {
                    el.textContent = hostname;
                }
            } catch (error) {
                console.log("Ошибка получения IP сервера:", error);
                el.textContent = hostname;
            }
        }

        // 2. IP Клиента
        async function getClientIP() {
            const el = document.getElementById('client-ip');
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                el.textContent = data.ip;
                el.classList.add('highlight');
            } catch(e) {
                el.textContent = 'Не удалось определить';
            }
        }

        // 3. DNS Серверы
        function getDNSServers() {
            const el = document.querySelector('td'); // находит ячейку DNS
            // Ищем нужную ячейку по заголовку
            const dnsCell = Array.from(document.querySelectorAll('th')).find(th => 
                th.textContent.includes('DNS')
            )?.parentElement?.querySelector('td');
            
            if (dnsCell) {
                dnsCell.innerHTML = `Основной: <strong>8.8.8.8</strong> (Google DNS)<br>Дополнительный: <strong>8.8.4.4</strong>`;
            }
        }

        // 4. User-Agent
        document.getElementById('browser-info').textContent = navigator.userAgent.substring(0, 80) + '...';

        // Запуск всех функций после загрузки
        window.onload = () => {
            getServerIP();
            getClientIP();
            getDNSServers();
        };
    </script>
</body>
</html>
